<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Push Notifications</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    #status {
      margin: 20px 0;
      padding: 15px;
      background: white;
      border-radius: 5px;
      font-weight: bold;
    }
    #token {
      background: #fff;
      padding: 15px;
      border-radius: 5px;
      word-break: break-all;
      font-size: 12px;
      color: #666;
      display: none;
    }
    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #4285f4;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>🔔 Firebase Push Notifications</h1>
  
  <div class="loader" id="loader"></div>
  <p id="status">جاري طلب الإذن...</p>
  <div id="token"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC3baiSF88fOAoivVMNDj7z2wLT_WuTnvQ",
      authDomain: "pushn-e9866.firebaseapp.com",
      projectId: "pushn-e9866",
      storageBucket: "pushn-e9866.firebasestorage.app",
      messagingSenderId: "855213779949",
      appId: "1:855213779949:web:d8541be6c8bcab1cbb15e4"
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    // طلب Permission أوتوماتيكيا
    function requestPermissionAutomatically() {
      console.log('Requesting permission automatically...');
      
      Notification.requestPermission().then((permission) => {
        console.log('Permission:', permission);
        
        document.getElementById('loader').style.display = 'none';
        
        if (permission === 'granted') {
          document.getElementById('status').innerText = '✅ تم منح الإذن بنجاح!';
          document.getElementById('status').style.background = '#d4edda';
          document.getElementById('status').style.color = '#155724';
          
          // جلب Token
          messaging.getToken({ 
            vapidKey: 'BAgwX5eo0-UfURsGVcgVvTdSb64RUkB1Bd86Ak5x8UdwQoOwONfv6u5WFe8MIHcfeyX6yFJKwqiXLbD7FJ3eeO8' 
          }).then((currentToken) => {
            if (currentToken) {
              console.log('Token:', currentToken);
              
              // إخفاء Token (مخفي للمستخدم، موجود f console)
              // Ila bghيتي يبان، حيد display:none من #token f CSS
              
              // Sift token l backend dyalk (API):
              sendTokenToServer(currentToken);
              
            } else {
              console.log('No token available');
              document.getElementById('status').innerText = '⚠️ تعذر الحصول على Token';
            }
          }).catch((err) => {
            console.log('Error getting token:', err);
            document.getElementById('status').innerText = '❌ خطأ: ' + err.message;
            document.getElementById('status').style.background = '#f8d7da';
            document.getElementById('status').style.color = '#721c24';
          });
          
        } else if (permission === 'denied') {
          document.getElementById('status').innerText = '❌ تم رفض الإذن';
          document.getElementById('status').style.background = '#f8d7da';
          document.getElementById('status').style.color = '#721c24';
        } else {
          document.getElementById('status').innerText = '⚠️ لم يتم اتخاذ قرار';
          document.getElementById('status').style.background = '#fff3cd';
          document.getElementById('status').style.color = '#856404';
        }
      });
    }

    // دالة لإرسال Token للسيرفر
    function sendTokenToServer(token) {
      console.log('Sending token to server:', token);
      
      // مثال: إرسال ل API dyalk
      fetch('https://your-api.com/save-token', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          token: token,
          timestamp: new Date().toISOString()
        })
      })
      .then(response => response.json())
      .then(data => {
        console.log('Token saved:', data);
      })
      .catch(error => {
        console.error('Error saving token:', error);
      });
    }

    // استقبال Notifications
    messaging.onMessage((payload) => {
      console.log('Message received:', payload);
      
      // عرض notification
      new Notification(payload.notification.title, {
        body: payload.notification.body,
        icon: payload.notification.icon || '/icon.png'
      });
    });

    // تشغيل تلقائي عند تحميل الصفحة
    window.addEventListener('load', () => {
      // انتظار 1 ثانية ثم طلب Permission
      setTimeout(() => {
        requestPermissionAutomatically();
      }, 1000);
    });
  </script>
</body>
</html>
